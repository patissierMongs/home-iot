<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>home-iot Analyst</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff; --accent2: #bc8cff; --green: #3fb950; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 600; }
  header span { color: var(--text-dim); font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 90%; padding: 14px 18px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.assistant h3 { color: var(--accent2); margin: 8px 0 4px; font-size: 14px; }
  .msg.assistant p { margin: 4px 0; }
  .msg.assistant strong { color: var(--accent); }
  .msg.assistant code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .msg.status { align-self: center; color: var(--text-dim); font-size: 13px; font-style: italic; }
  .chart-container { width: 100%; margin: 12px 0; border-radius: 8px; overflow: hidden; }
  #input-bar { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
  #input-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; }
  #input-bar input:focus { border-color: var(--accent); }
  #input-bar button { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 12px 24px; font-weight: 600; cursor: pointer; font-size: 14px; }
  #input-bar button:hover { opacity: 0.9; }
  #input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
  .examples { padding: 24px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .examples button { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; color: var(--text-dim); font-size: 13px; cursor: pointer; }
  .examples button:hover { border-color: var(--accent); color: var(--text); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>home-iot Analyst</h1>
  <span>Nemotron Cascade 2 · local LLM · your data only</span>
</header>

<div id="chat">
  <div class="examples">
    <button onclick="ask(this.textContent)">내 수면 시간과 가장 관계가 큰 데이터가 뭐야?</button>
    <button onclick="ask(this.textContent)">온/습도가 수면 시작 시간과 연관이 있어?</button>
    <button onclick="ask(this.textContent)">최근 30일 스트레스 점수 추이 보여줘</button>
    <button onclick="ask(this.textContent)">심박수가 비정상적으로 높았던 날이 있어?</button>
    <button onclick="ask(this.textContent)">오늘 뭐 하고 있었어?</button>
    <button onclick="ask(this.textContent)">운동한 날과 안 한 날 수면 질 차이</button>
  </div>
</div>

<div id="input-bar">
  <input id="input" type="text" placeholder="데이터에 대해 물어보세요..." autocomplete="off" />
  <button id="send" onclick="send()">분석</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let ws = null;
let chartCount = 0;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => console.log('ws connected');
  ws.onclose = () => { console.log('ws closed, reconnecting...'); setTimeout(connect, 2000); };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    // Remove status messages
    document.querySelectorAll('.msg.status').forEach(el => el.remove());

    if (msg.type === 'status') {
      addMessage('status', '분석 중...');
    } else if (msg.type === 'answer') {
      addAssistantMessage(msg.text, msg.chart);
    } else if (msg.type === 'error') {
      addMessage('assistant', '⚠️ ' + msg.text);
    }
    sendBtn.disabled = false;
    input.disabled = false;
  };
}

function addMessage(cls, text) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addAssistantMessage(text, chartSpec) {
  const div = document.createElement('div');
  div.className = 'msg assistant';

  // Render markdown-lite (bold, headers, line breaks)
  let html = (text || '')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/### (.*?)$/gm, '<h3>$1</h3>')
    .replace(/## (.*?)$/gm, '<h3>$1</h3>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
  div.innerHTML = html;

  // Render chart if present
  if (chartSpec && chartSpec.data) {
    const chartDiv = document.createElement('div');
    chartDiv.className = 'chart-container';
    chartDiv.id = 'chart-' + (++chartCount);
    chartDiv.style.height = '400px';
    div.appendChild(chartDiv);
    chat.appendChild(div);
    // Plotly render after DOM insertion
    const layout = Object.assign({
      paper_bgcolor: '#161b22',
      plot_bgcolor: '#0d1117',
      font: { color: '#e6edf3', size: 12 },
      margin: { t: 40, r: 20, b: 50, l: 60 },
      xaxis: { gridcolor: '#30363d' },
      yaxis: { gridcolor: '#30363d' },
    }, chartSpec.layout || {});
    Plotly.newPlot(chartDiv.id, chartSpec.data, layout, { responsive: true, displayModeBar: false });
  } else {
    chat.appendChild(div);
  }
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  addMessage('user', text);
  ws.send(text);
  input.value = '';
  sendBtn.disabled = true;
  input.disabled = true;
  // Remove example buttons after first use
  const examples = document.querySelector('.examples');
  if (examples) examples.remove();
}

function ask(text) {
  input.value = text;
  send();
}

input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
connect();
</script>
</body>
</html>
