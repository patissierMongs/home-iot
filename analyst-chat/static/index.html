<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>home-iot Analyst</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff; --accent2: #bc8cff; --green: #3fb950; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 600; }
  header span { color: var(--text-dim); font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 92%; padding: 14px 18px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.assistant h3 { color: var(--accent2); margin: 8px 0 4px; font-size: 14px; }
  .msg.assistant p { margin: 4px 0; }
  .msg.assistant strong { color: var(--accent); }
  .msg.assistant code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .msg.status { align-self: center; color: var(--text-dim); font-size: 13px; font-style: italic; }
  .chart-container { width: 100%; height: 400px; margin: 12px 0; border-radius: 8px; overflow: hidden; }
  .map-container { width: 100%; height: 450px; margin: 12px 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .timeline-container { width: 100%; margin: 12px 0; }
  .tl-event { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; border-left: 2px solid var(--accent); margin-left: 8px; padding-left: 16px; }
  .tl-event .tl-time { color: var(--text-dim); font-size: 12px; min-width: 120px; white-space: nowrap; }
  .tl-event .tl-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .tl-event .tl-label { font-size: 13px; }
  .tl-event .tl-dur { color: var(--text-dim); font-size: 12px; }
  #input-bar { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
  #input-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; }
  #input-bar input:focus { border-color: var(--accent); }
  #input-bar button { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 12px 24px; font-weight: 600; cursor: pointer; font-size: 14px; }
  #input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
  .examples { padding: 24px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .examples button { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; color: var(--text-dim); font-size: 13px; cursor: pointer; }
  .examples button:hover { border-color: var(--accent); color: var(--text); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .leaflet-container { background: var(--bg) !important; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>home-iot Analyst</h1>
  <span>Nemotron Cascade 2 · local LLM · your data only</span>
</header>

<div id="chat">
  <div class="examples">
    <button onclick="ask(this.textContent)">내 수면 시간과 가장 관계가 큰 데이터가 뭐야?</button>
    <button onclick="ask(this.textContent)">최근 30일 스트레스 점수 추이 보여줘</button>
    <button onclick="ask(this.textContent)">최근 방문한 장소들을 지도에 보여줘</button>
    <button onclick="ask(this.textContent)">어제 내 이동 경로를 지도에 그려줘</button>
    <button onclick="ask(this.textContent)">가장 자주 방문한 장소 Top 10</button>
    <button onclick="ask(this.textContent)">오늘 활동 타임라인 보여줘</button>
    <button onclick="ask(this.textContent)">운동한 날과 안 한 날 수면 질 차이</button>
    <button onclick="ask(this.textContent)">심박수가 비정상적으로 높았던 날이 있어?</button>
  </div>
</div>

<div id="input-bar">
  <input id="input" type="text" placeholder="데이터에 대해 물어보세요..." autocomplete="off" />
  <button id="send" onclick="send()">분석</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let ws = null;
let vizCount = 0;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => console.log('ws connected');
  ws.onclose = () => { setTimeout(connect, 2000); };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    document.querySelectorAll('.msg.status').forEach(el => el.remove());
    if (msg.type === 'status') addMessage('status', '분석 중...');
    else if (msg.type === 'answer') addAssistantMessage(msg.text, msg.chart, msg.map, msg.timeline);
    else if (msg.type === 'error') addMessage('assistant', '⚠️ ' + msg.text);
    sendBtn.disabled = false;
    input.disabled = false;
  };
}

function addMessage(cls, text) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addAssistantMessage(text, chartSpec, mapSpec, timelineSpec) {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  let html = (text || '')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/### (.*?)$/gm, '<h3>$1</h3>')
    .replace(/## (.*?)$/gm, '<h3>$1</h3>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
  div.innerHTML = html;

  // Chart (Plotly)
  if (chartSpec && chartSpec.data) {
    const el = document.createElement('div');
    el.className = 'chart-container';
    el.id = 'viz-' + (++vizCount);
    div.appendChild(el);
    chat.appendChild(div);
    Plotly.newPlot(el.id, chartSpec.data, Object.assign({
      paper_bgcolor: '#161b22', plot_bgcolor: '#0d1117',
      font: { color: '#e6edf3', size: 12 },
      margin: { t: 40, r: 20, b: 50, l: 60 },
      xaxis: { gridcolor: '#30363d' }, yaxis: { gridcolor: '#30363d' },
    }, chartSpec.layout || {}), { responsive: true, displayModeBar: false });
  }

  // Map (Leaflet)
  if (mapSpec) {
    const el = document.createElement('div');
    el.className = 'map-container';
    el.id = 'map-' + (++vizCount);
    div.appendChild(el);
    chat.appendChild(div);
    setTimeout(() => renderMap(el.id, mapSpec), 100);
  }

  // Timeline
  if (timelineSpec && timelineSpec.events) {
    const el = document.createElement('div');
    el.className = 'timeline-container';
    el.innerHTML = renderTimeline(timelineSpec);
    div.appendChild(el);
  }

  if (!chartSpec && !mapSpec && !timelineSpec) chat.appendChild(div);
  else if (!div.parentNode) chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function renderMap(elId, spec) {
  const center = spec.center || [37.45, 126.89];
  const zoom = spec.zoom || 13;
  const map = L.map(elId, { zoomControl: true }).setView(center, zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO', maxZoom: 19
  }).addTo(map);

  // Markers
  (spec.markers || []).forEach(m => {
    const color = m.color || '#58a6ff';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:12px;height:12px;background:${color};border-radius:50%;border:2px solid #fff;"></div>`,
      iconSize: [12, 12], iconAnchor: [6, 6]
    });
    L.marker([m.lat, m.lon], { icon }).addTo(map)
      .bindPopup(`<b>${m.label || ''}</b>${m.detail ? '<br>' + m.detail : ''}`);
  });

  // Path (polyline)
  if (spec.path && spec.path.length > 1) {
    const latlngs = spec.path.map(p => [p.lat, p.lon]);
    L.polyline(latlngs, { color: spec.path_color || '#58a6ff', weight: 3, opacity: 0.8 }).addTo(map);
    map.fitBounds(L.polyline(latlngs).getBounds().pad(0.1));
  }

  // Heatmap
  if (spec.heatmap && spec.heatmap.length > 0) {
    const heat = spec.heatmap.map(h => [h.lat, h.lon, h.intensity || 1]);
    L.heatLayer(heat, { radius: 20, blur: 25, maxZoom: 15, gradient: {0.2:'#0000ff', 0.4:'#00ffff', 0.6:'#00ff00', 0.8:'#ffff00', 1.0:'#ff0000'} }).addTo(map);
    const bounds = heat.map(h => [h[0], h[1]]);
    if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });
  }

  // Auto-fit if markers but no path/heatmap
  if (spec.markers && spec.markers.length > 1 && !spec.path && !spec.heatmap) {
    const bounds = spec.markers.map(m => [m.lat, m.lon]);
    map.fitBounds(bounds, { padding: [30, 30] });
  }

  setTimeout(() => map.invalidateSize(), 200);
}

function renderTimeline(spec) {
  const colors = { VISIT: '#bc8cff', WALKING: '#3fb950', IN_VEHICLE: '#58a6ff', CYCLING: '#f0883e', STILL: '#8b949e', default: '#58a6ff' };
  let html = '';
  for (const ev of spec.events) {
    const color = colors[ev.type] || colors.default;
    const dur = ev.duration_min ? `${Math.round(ev.duration_min)}분` : '';
    html += `<div class="tl-event">
      <span class="tl-time">${ev.time || ''}</span>
      <div class="tl-dot" style="background:${color}"></div>
      <div><span class="tl-label">${ev.label || ''}</span> <span class="tl-dur">${dur}</span></div>
    </div>`;
  }
  return html;
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  addMessage('user', text);
  ws.send(text);
  input.value = '';
  sendBtn.disabled = true;
  input.disabled = true;
  const ex = document.querySelector('.examples');
  if (ex) ex.remove();
}

function ask(text) { input.value = text; send(); }
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
connect();
</script>
</body>
</html>
