###############################################################################
# home-iot telegraf 설정
# - WSL 시스템 메트릭 + Docker 컨테이너 상태 + GPU + MQTT 메트릭
# - 모든 출력 InfluxDB 2.x "home-iot" 버킷
###############################################################################

[global_tags]
  host_role = "wsl-home-iot"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "yuyu-wsl"
  omit_hostname = false

###############################################################################
# OUTPUT
###############################################################################

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "homeiot-super-secret-token"
  organization = "home"
  bucket = "home-iot"

###############################################################################
# INPUTS: 시스템
###############################################################################

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = true

[[inputs.mem]]
[[inputs.swap]]
[[inputs.system]]
[[inputs.kernel]]
[[inputs.processes]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "squashfs"]

[[inputs.diskio]]

[[inputs.net]]
  interfaces = ["eth*", "lo"]

###############################################################################
# INPUTS: Docker
###############################################################################

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice_include = ["cpu", "blkio", "network"]
  total_include = ["cpu", "blkio", "network"]

###############################################################################
# INPUTS: NVIDIA GPU (nvidia-smi)
###############################################################################

[[inputs.nvidia_smi]]
  bin_path = "/usr/bin/nvidia-smi"
  timeout = "5s"

###############################################################################
# INPUTS: MQTT (우리 브로커 활동 추적)
###############################################################################

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "home-iot/#",
    "SleepAsAndroid/#",
    "homeassistant/#",
    "hass.agent/#",
  ]
  qos = 0
  connection_timeout = "30s"
  persistent_session = false
  client_id = "telegraf"
  data_format = "value"
  data_type = "string"
  name_override = "mqtt_raw"

###############################################################################
# INPUTS: HTTP 헬스 체크
###############################################################################

[[inputs.http_response]]
  urls = [
    "http://homeassistant:8123",
    "http://influxdb:8086/health",
    "http://grafana:3000/api/health",
    "http://ollama:11434/api/version",
  ]
  response_timeout = "5s"
  method = "GET"
