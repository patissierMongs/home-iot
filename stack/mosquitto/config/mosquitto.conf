# Mosquitto 2.x 기본 설정 (Docker)
# 주의: 초기 개발 단계에서 allow_anonymous=true 사용.
# HA/Qingping 통합 후 반드시 user/password 기반 ACL로 전환할 것.

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

listener 1883 0.0.0.0
allow_anonymous true

listener 9001 0.0.0.0
protocol websockets
